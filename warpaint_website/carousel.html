<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="carouselExample" class="carousel slide w-75 mx-auto mt-4" data-bs-ride="carousel">

        <div class="carousel-inner">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
            </div> 

            <div class="carousel-item active">
                <img src="img/versace.jpg" class="d-block w-100" alt="Slide 1">
                 <div class="carousel-caption d-none d-md-block">
                    <h5>Daniel Caesar</h5>
                    <p>Live music event coming soon.</p>
                </div> 

            <div class="carousel-item">
                <img src="img/dior.jpg" class="d-block w-100" alt="Slide 2">
               div class="carousel-caption d-none d-md-block">
                    <h5>Kali Uchis</h5>
                    <p> Live music event coming soon.</p>
                </div> 
            </div>

            <div class="carousel-item">
                <img src="img/Columbia.jpg" class="d-block w-100" alt="Slide 3">
               <div class="carousel-caption d-none d-md-block">
                    <h5>Cuco</h5>
                    <p>Live music event coming soon.</p>
                </div>
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    <script src="js/bootstrap.bundle.js"></script>

</body>

</html>
